EETurboDisable:
  - msr
  - "0x1fc"
  - 19  # bit
  - Enabled: 0
    Disabled: 1

PwrPerfTuning:
  - msr
  - "0x1fc"
  - 34  # bit
  - OS Controls EPB: 0
    BIOS Controls EPB: 1
    PECI Controls EPB: 0  # if index >= 2, force set to 0

AltEngPerfBIAS:
  - msr
  - "0x1b0"
  - 0-3  # bit
  - Performance: 0
    Balanced Performance: 7

TurboMode:
  - msr
  - "0x1a0"
  - 38  # bit
  - Enabled: 0
    Disabled: 1

PackageCState:
  - msr
  - "0xe2"
  - 0-3  # bit
  - C0/C1 State: 0
    C6(Non-Retention State): 0x2
    C6(Retention State): 0x3
    Auto: 0x3

KtiLinkL1En:
  - cscripts
  - sv.socket0.uncore.upi.showsearch("c_l1_en","f")
  - c_l1_en
  - Enabled: 1
    Disabled: 0
    Auto: 1
  - any  # 至少1个等于

LLCDeadLineAlloc:
